<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
        }

        .navbar {
            background: #4f46e5;
            color: white;
            padding: 15px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #4f46e5;
            border: none;
        }

        .btn-danger {
            border-radius: 8px;
        }

        table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #4f46e5;
            color: white;
        }
    </style>
</head>

<body onload="checkLogin(); renderTable()">

<div class="navbar d-flex justify-content-between">
    <h4>HR Dashboard</h4>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>

<div class="container mt-4">

    <div class="card p-3 mb-4">

        <h5>Add Employee</h5>

        <div class="row">
            <div class="col">
                <input id="empName" class="form-control" placeholder="Name">
            </div>
            <div class="col">
                <input id="empRole" class="form-control" placeholder="Role">
            </div>
            <div class="col">
                <input id="empDept" class="form-control" placeholder="Department">
            </div>
        </div>

        <button class="btn btn-primary mt-3" onclick="addEmployee()">Add Employee</button>

    </div>

    <input id="search" class="form-control mb-3" placeholder="Search employee..." onkeyup="searchEmployee()">

    <div class="card p-3">

        <table class="table table-bordered text-center">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Department</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="empTable"></tbody>
        </table>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
